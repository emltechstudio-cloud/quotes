<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e35"/>
      <stop offset="100%" style="stop-color:#1a3050"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8ff45"/>
      <stop offset="100%" style="stop-color:#3d9eff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Document shape -->
  <rect x="130" y="100" width="220" height="280" rx="20" fill="none" stroke="#ffffff" stroke-width="18" opacity="0.15"/>
  <!-- Document folded corner -->
  <path d="M310 100 L350 140 L310 140 Z" fill="#ffffff" opacity="0.1"/>
  <path d="M310 100 L350 140" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.2"/>
  <!-- Lines on document -->
  <line x1="165" y1="195" x2="295" y2="195" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.2"/>
  <line x1="165" y1="230" x2="270" y2="230" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
  <line x1="165" y1="265" x2="255" y2="265" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.12"/>
  <!-- Big Q letter / magnifier -->
  <circle cx="248" cy="248" r="105" fill="none" stroke="url(#bolt)" stroke-width="32"/>
  <!-- Lightning bolt inside circle -->
  <path d="M268 185 L230 258 H258 L226 318" stroke="url(#bolt)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Search handle -->
  <line x1="324" y1="324" x2="385" y2="385" stroke="url(#bolt)" stroke-width="32" stroke-linecap="round"/>
</svg>
